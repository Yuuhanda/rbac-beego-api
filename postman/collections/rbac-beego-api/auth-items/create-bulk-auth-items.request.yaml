$kind: http-request
name: Create Bulk Auth Items
method: POST
url: '{{baseUrl}}/api/auth-items/bulk'
order: 6000
headers:
  - key: Content-Type
    value: application/json
  - key: token
    value: '{{authToken}}'
body:
  type: json
  content: |-
    {
      "Role": "admin",
      "Paths": ["/api/users", "/api/roles"]
    }
