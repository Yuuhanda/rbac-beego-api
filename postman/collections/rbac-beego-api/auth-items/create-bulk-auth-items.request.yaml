$kind: http-request
name: Create Bulk Auth Items
method: POST
url: "{{baseUrl}}/api/auth-items/bulk"
order: 6000
headers:
  Content-Type: application/json
  Authorization: "{{authToken}}"
body:
  type: json
  content: |-
    {
      "Role": "admin",
      "Paths": ["/users", "/api/roles", "/api/roles"]
    }
