$kind: http-request
name: Create Auth Item
method: POST
url: '{{baseUrl}}/api/auth-items'
order: 1000
headers:
  - key: Content-Type
    value: application/json
  - key: token
    value: '{{authToken}}'
body:
  type: json
  content: |-
    {
      "Role": "admin",
      "Path": "/api/users",
      "Method": "GET"
    }
