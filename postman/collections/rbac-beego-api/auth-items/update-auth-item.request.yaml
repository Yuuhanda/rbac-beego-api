$kind: http-request
name: Update Auth Item
method: PUT
url: '{{baseUrl}}/api/auth-items/:id'
order: 4000
pathVariables:
  - key: id
    value: '1'
headers:
  - key: Content-Type
    value: application/json
  - key: token
    value: '{{authToken}}'
body:
  type: json
  content: |-
    {
      "Role": "admin",
      "Path": "/api/users",
      "Method": "POST"
    }
