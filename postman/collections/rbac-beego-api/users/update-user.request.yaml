$kind: http-request
name: Update User
method: PUT
url: '{{baseUrl}}/user-update/:id'
order: 4000
pathVariables:
  - key: id
    value: '1'
headers:
  - key: Content-Type
    value: application/json
  - key: token
    value: '{{authToken}}'
body:
  type: json
  content: |-
    {
      "username": "johndoe_updated",
      "email": "john@example.com",
      "status": 1
    }
