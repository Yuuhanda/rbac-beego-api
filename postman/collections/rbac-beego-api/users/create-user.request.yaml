$kind: http-request
name: Create User
method: POST
url: '{{baseUrl}}/user'
order: 1000
headers:
  - key: Content-Type
    value: application/json
  - key: token
    value: '{{authToken}}'
body:
  type: json
  content: |-
    {
      "username": "johndoe",
      "email": "john@example.com",
      "password": "password123"
    }
